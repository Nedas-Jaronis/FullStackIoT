<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESP32 Firebase Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Arial&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0a0c10;
      --surface:     #11141c;
      --surface2:    #181c27;
      --border:      rgba(255, 255, 255, 0.07);
      --accent:      #4f8ef7;
      --accent-dim:  rgba(79, 142, 247, 0.15);
      --green:       #22c55e;
      --green-dim:   rgba(34, 197, 94, 0.12);
      --red:         #ef4444;
      --red-dim:     rgba(239, 68, 68, 0.12);
      --text:        #e2e8f0;
      --text-muted:  #64748b;
      --radius:      14px;
      --radius-sm:   8px;
      --transition:  0.2s ease;
    }

    /* ── Light Mode Variables ────────────────────────────────── */
    :root.light {
      --bg:          #f0f2f7;
      --surface:     #ffffff;
      --surface2:    #e8ecf4;
      --border:      rgba(0, 0, 0, 0.08);
      --accent:      #3b7ff5;
      --accent-dim:  rgba(59, 127, 245, 0.12);
      --green:       #22c55e;
      --green-dim:   rgba(34, 197, 94, 0.12);
      --red:         #ef4444;
      --red-dim:     rgba(239, 68, 68, 0.12);
      --text:        #e2e8f0;
      --text-muted:  #374151;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-weight: bold }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Arial', monospace;
      min-height: 100vh;
      padding: 24px;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(0,212,255,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(0,255,157,0.03) 0%, transparent 50%);
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-family: 'Arial', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: var(--glow);
      letter-spacing: 0.15em;
    }

    header p {
      color: var(--text-dim);
      font-size: 1rem;
      margin-top: 6px;
      letter-spacing: 0.1em;
    }

    #status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      margin-right: 8px;
      vertical-align: middle;
      transition: background 0.3s;
    }
    #status-dot.connected { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
      margin-top: 80px;
      justify-content: center;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .card:hover { border-color: rgba(0,212,255,0.3); }

    .card-label {
      font-size: 0.89rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* LDR Gauge */
    .gauge-track {
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      height: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 10px;
    }

    .gauge-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #00d4ff, #00ff9d);
      width: 0%;
      transition: width 0.6s ease;
      box-shadow: 0 0 10px rgba(0,212,255,0.5);
    }

    .gauge-value {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      color: var(--accent);
      text-shadow: var(--glow);
    }

    .gauge-sub {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .toggle-label {
      font-size: 0.85rem;
      color: var(--text);
    }

    .toggle {
      position: relative;
      width: 52px;
      height: 28px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: background 0.3s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--text-dim);
      top: 3px;
      left: 3px;
      transition: transform 0.3s, background 0.3s;
    }

    .toggle input:checked + .toggle-slider {
      background: rgba(0,255,157,0.15);
      border-color: var(--accent2);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(24px);
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
    }

    .btn-status {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-top: 12px;
      letter-spacing: 0.1em;
    }

    .btn-status span {
      color: var(--accent2);
    }

    /* Sliders */
    .slider-value {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem;
      color: var(--accent);
      text-shadow: var(--glow);
      margin-bottom: 12px;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      outline: none;
      border: 1px solid var(--border);
      cursor: pointer;
      margin-top: 8px;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
      transition: transform 0.15s;
    }

    input[type=range]::-webkit-slider-thumb:active {
      transform: scale(1.2);
    }

    #servo-slider::-webkit-slider-thumb {
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
    }

    .slider-range {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-top: 6px;
    }

    .card.span2 { grid-column: span 2; }

    @media (max-width: 600px) {
      .card.span2 { grid-column: span 1; }
      header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>ESP32 FIREBASE DASHBOARD</h1>
  <p><span id="status-dot"></span><span id="status-text">CONNECTING...</span></p>
</header>

<div class="grid">

  <!-- LDR Gauge -->
  <div class="card">
    <div class="card-label">LDR Sensor</div>
    <div class="gauge-value" id="ldr-val">0</div>
    <div class="gauge-sub">Raw ADC value (0 – 4095)</div>
    <div class="gauge-track" style="margin-top:14px;">
      <div class="gauge-fill" id="ldr-bar"></div>
    </div>
  </div>

  <!-- LED Digital Toggle -->
  <div class="card">
    <div class="card-label">LED Digital Control</div>
    <div class="toggle-row">
      <span class="toggle-label">LED Power</span>
      <label class="toggle">
        <input type="checkbox" id="led-toggle" onchange="setLEDDigital(this.checked)">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="btn-status">
      Physical button: <span id="btn-state">FALSE</span>
    </div>
  </div>

  <!-- LED Brightness Slider -->
  <div class="card">
    <div class="card-label">LED Brightness (Analog)</div>
    <div class="slider-value"><span id="analog-val">0</span> <small style="font-size:0.85rem;color:var(--text-dim)">/ 255</small></div>
    <input type="range" id="analog-slider" min="0" max="255" value="0"
      oninput="document.getElementById('analog-val').textContent=this.value"
      onchange="setLEDAnalog(this.value)">
    <div class="slider-range"><span>0</span><span>255</span></div>
  </div>

  <!-- Servo Slider -->
  <div class="card">
    <div class="card-label">Servo Angle</div>
    <div class="slider-value"><span id="servo-val">0</span> <small style="font-size:0.6rem;color:var(--text-dim)">°</small></div>
    <input type="range" id="servo-slider" min="0" max="180" value="0"
      oninput="document.getElementById('servo-val').textContent=this.value"
      onchange="setServoAngle(this.value)">
    <div class="slider-range"><span>0°</span><span>180°</span></div>
  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, onChildChanged }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

  // firebase config
  const firebaseConfig = {
    apiKey:      "AIzaSyDkb9PWu8qBo7Zciske9l-49wIuv8uC4hY",
    authDomain:  "esp32-realtime-database-bc68f.firebaseapp.com",
    databaseURL: "https://esp32-realtime-database-bc68f-default-rtdb.firebaseio.com",
    projectId:   "esp32-realtime-database-bc68f",
    storageBucket: "esp32-realtime-database-bc68f.appspot.com",
    messagingSenderId: "1093088737297",
    appId: "1:1093088737297:web:316e1a587e2bcc9e8d19b0"
  };
  // ─────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // status indicator
  const dot  = document.getElementById('status-dot');
  const stxt = document.getElementById('status-text');
  dot.classList.add('connected');
  stxt.textContent = 'CONNECTED';

  // LDR - listen and update gauge
  onValue(ref(db, 'Sensor/ldr_data'), snap => {
    const val = snap.val() ?? 0;
    document.getElementById('ldr-val').textContent = val;
    const pct = Math.min((val / 4095) * 100, 100).toFixed(1);
    document.getElementById('ldr-bar').style.width = pct + '%';
  });

  // button state - isten for physical button press
  onValue(ref(db, 'Sensor/switch'), snap => {
    const val = snap.val();
    document.getElementById('btn-state').textContent = val ? 'TRUE' : 'FALSE';
    document.getElementById('btn-state').style.color = val ? 'var(--warn)' : 'var(--accent2)';
  });

  // LED digital - listen so UI stays in sync
  onValue(ref(db, 'LED/digital'), snap => {
    document.getElementById('led-toggle').checked = snap.val() ?? false;
  });

  // LED analog - listen so slider stays in sync
  onValue(ref(db, 'LED/analog'), snap => {
    const val = snap.val() ?? 0;
    document.getElementById('analog-slider').value = val;
    document.getElementById('analog-val').textContent = val;
  });

  // servo - listen so slider stays in sync
  onValue(ref(db, 'Servo/angle'), snap => {
    const val = snap.val() ?? 0;
    document.getElementById('servo-slider').value = val;
    document.getElementById('servo-val').textContent = val;
  });

  // write functions exposed to global scope
  window.setLEDDigital = (val) => set(ref(db, 'LED/digital'), val);
  window.setLEDAnalog  = (val) => set(ref(db, 'LED/analog'),  parseInt(val));
  window.setServoAngle = (val) => set(ref(db, 'Servo/angle'), parseInt(val));
</script>

</body>
</html>
